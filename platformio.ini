[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = arduino

upload_protocol = serial
upload_port = COM7
upload_speed = 115200

monitor_speed = 115200

lib_deps =
  lvgl/lvgl@^8.3.11

build_flags =
  -DTFT_DRIVER_ST7735=1
  -DLV_CONF_INCLUDE_SIMPLE
  -I include

; important for STM32 ROM bootloader upload stability
upload_flags =
  -b
  115200
