[platformio]
default_envs = stm32f107custom

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = arduino

build_src_filter =
  +<*>
  -<usb_legacy/>

upload_protocol = serial
upload_port = COM7
upload_speed = 115200
upload_flags =
  -b
  115200

monitor_speed = 115200

lib_deps =
  lvgl/lvgl@^8.3.11

build_flags =
  -DTFT_DRIVER_ST7735=1
  -DLV_CONF_INCLUDE_SIMPLE
  -I include

[env:stm32f107custom]
platform = ststm32
board = genericSTM32F107VC
framework = arduino

build_src_filter =
  +<*>
  -<usb_legacy/>

build_type = debug
debug_tool = stlink
upload_protocol = stlink
debug_init_break = break loop

lib_deps =
  lvgl/lvgl@^8.3.11

build_flags =
  -DPIO_FRAMEWORK_ARDUINO_ENABLE_CDC
  -DUSBCON
  -DUSBD_USE_CDC
  -DUSBD_ENUM_DELAY=120
  -DDEBUG=1
  -DDEBUG_OUTPUT=DEBUG_OUTPUT_SWD
  ; -DDEBUG_OUTPUT=DEBUG_OUTPUT_NONE
  ; -DDEBUG_OUTPUT=DEBUG_OUTPUT_USB
  -DTFT_DRIVER=TFT_DRIVER_ST7789
  -DLV_CONF_INCLUDE_SIMPLE
  -I include
  -Og
  -g3

; TODO does not work... vbus sense? invalid clock?
[env:stm32f107_usb_legacy]
platform = ststm32
board = genericSTM32F107VC
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
build_type = debug

; Keep this environment isolated for USB bring-up and legacy stack integration.
build_src_filter =
  -<*>
  +<usb_legacy/>

build_flags =
  -DDEBUG=1
  -DUSB_LEGACY_BRINGUP=1
  -DDEBUG_OUTPUT=DEBUG_OUTPUT_SWD
  ; -DDEBUG_OUTPUT=DEBUG_OUTPUT_NONE
  ; -DDEBUG_OUTPUT=DEBUG_OUTPUT_USB
  -DTFT_DRIVER=TFT_DRIVER_ST7789
  -DLV_CONF_INCLUDE_SIMPLE
  -I include
  -Og
  -g3
